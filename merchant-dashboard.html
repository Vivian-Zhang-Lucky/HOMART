<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard · HOMART Merchant</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/merchant.css" />
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/merchant-layout.js"></script>
    <script>
  (async () => {
    if (!await MerchantLayout.render({ active: "dashboard", title: "Merchant Dashboard" })) return;

    const products   = DataStore.getProducts({ includeDrafts: true });
    const categories = DataStore.getCategories();
    const orders     = DataStore.getOrders();
    const lowStock   = products.filter(p => p.inStock && (p.stockQty ?? 0) < 15);

    /* ── Fetch real conversation data from Supabase ── */
    let conversations = [];
    let totalUnread = 0;
    if (window._sbClient) {
      try {
        const { data, error } = await window._sbClient
          .from("conversations")
          .select("id, customer_name, last_message, last_at, unread_merchant")
          .eq("merchant_id", "default-store")
          .order("last_at", { ascending: false });
        if (error) throw error;
        conversations = data || [];
        totalUnread = conversations.reduce((s, c) => s + (c.unread_merchant || 0), 0);
      } catch (e) {
        console.warn("Dashboard: failed to load conversations:", e);
      }
    }

    /* ── Render shell HTML ── */
    document.getElementById("m-content").innerHTML = `
      <div class="m-welcome">
        <p><b>Welcome back,</b> manage your store with ease.</p>
        <a class="btn btn--primary" href="merchant-product-edit.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add New Product
        </a>
      </div>

      <div class="m-stats">
        <div class="m-stat">
          <div class="m-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div>
          <div class="m-stat__body">
            <div class="m-stat__label">Total Products</div>
            <div class="m-stat__value">${products.length}</div>
            <span class="m-stat__delta">${categories.length} categories</span>
          </div>
        </div>
        <div class="m-stat">
          <div class="m-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg></div>
          <div class="m-stat__body">
            <div class="m-stat__label">Total Orders</div>
            <div class="m-stat__value">${orders.length}</div>
            <span class="m-stat__delta${orders.filter(o=>o.status==='pending').length ? ' m-stat__delta--warn' : ''}">${orders.filter(o=>o.status==='pending').length} pending</span>
          </div>
        </div>
        <div class="m-stat">
          <div class="m-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
          <div class="m-stat__body">
            <div class="m-stat__label">Active Chats</div>
            <div class="m-stat__value">${conversations.length}</div>
            <span class="m-stat__delta${totalUnread ? ' m-stat__delta--warn' : ''}">${totalUnread ? totalUnread + ' unread' : 'All read'}</span>
          </div>
        </div>
        <div class="m-stat">
          <div class="m-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div>
          <div class="m-stat__body">
            <div class="m-stat__label">Low Stock Items</div>
            <div class="m-stat__value">${lowStock.length}</div>
            <span class="m-stat__delta${lowStock.length ? ' m-stat__delta--warn' : ''}">${lowStock.length ? 'Need restocking' : 'Stock OK'}</span>
          </div>
        </div>
      </div>

      <div class="m-grid-2">
        <div class="m-panel m-chart-card">
          <div class="m-chart-top">
            <div>
              <div class="m-panel__title">Sales &amp; Inquiry Overview</div>
              <div class="m-chart-controls">
                <select class="m-chart-select" onchange="window._dashRenderChart(this.value)">
                  <option value="week">This Week</option>
                  <option value="month">This Month</option>
                  <option value="quarter">This Quarter</option>
                </select>
                <div class="m-chart-legend">
                  <span><i style="background:#0f2e1f"></i> Inquiries</span>
                  <span><i style="background:#86efac"></i> Orders</span>
                </div>
              </div>
            </div>
            <div class="m-chart-totals">
              <div>
                <span>Total Inquiries</span>
                <b>${conversations.length}</b>
              </div>
              <div>
                <span>Total Orders</span>
                <b>${orders.length}</b>
              </div>
            </div>
          </div>
          <svg class="m-chart-svg" id="chart-svg" viewBox="0 0 800 240" preserveAspectRatio="none"></svg>
          <div class="m-chart-axis" id="chart-axis"></div>
        </div>

        <div class="m-panel">
          <div class="m-panel__head"><div class="m-panel__title">Quick Actions</div></div>
          <div class="m-quick-actions">
            <a class="m-quick-btn m-quick-btn--primary" href="merchant-product-edit.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Product
            </a>
            <a class="m-quick-btn" href="merchant-categories.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              Manage Categories
            </a>
            <a class="m-quick-btn" href="merchant-orders.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
              View Orders
            </a>
            <a class="m-quick-btn" href="merchant-messages.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              Open Chat Inbox
            </a>
          </div>
        </div>
      </div>

      <div class="m-grid-2b">
        <div class="m-panel">
          <div class="m-panel__head">
            <div class="m-panel__title">Recent Product Updates</div>
            <a class="m-panel__link" href="merchant-products.html">View All</a>
          </div>
          <table class="m-table">
            <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="recent-products"></tbody>
          </table>
        </div>

        <div class="m-panel">
          <div class="m-panel__head">
            <div class="m-panel__title">Recent Customer Inquiries</div>
            <a class="m-panel__link" href="merchant-messages.html">View All</a>
          </div>
          <div class="m-inq-list" id="recent-inquiries"></div>
        </div>
      </div>

      <div class="m-alert-strip" id="low-stock-strip"></div>
    `;

    /* ── Chart ── */
    function buildChartData(key) {
      const now = new Date();
      let labels, slots, orderSlot, convSlot;

      if (key === "week") {
        labels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
        slots = 7;
        const dow = now.getDay(); // 0=Sun
        const startOfWeek = new Date(now);
        startOfWeek.setHours(0,0,0,0);
        startOfWeek.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
        orderSlot = d => { const diff = Math.floor((new Date(d) - startOfWeek) / 86400000); return diff >= 0 && diff < 7 ? diff : -1; };
        convSlot  = d => orderSlot(d);
      } else if (key === "month") {
        labels = ["W1","W2","W3","W4"];
        slots = 4;
        const som = new Date(now.getFullYear(), now.getMonth(), 1);
        orderSlot = d => { const dd = new Date(d); if (dd < som) return -1; return Math.min(3, Math.floor((dd.getDate()-1)/7)); };
        convSlot  = d => orderSlot(d);
      } else {
        const mNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        labels = [0,1,2].map(i => { const d = new Date(now.getFullYear(), now.getMonth()-2+i, 1); return mNames[d.getMonth()]; });
        slots = 3;
        orderSlot = d => { const dd = new Date(d); const diff = (now.getFullYear()-dd.getFullYear())*12 + now.getMonth()-dd.getMonth(); return diff >= 0 && diff < 3 ? 2-diff : -1; };
        convSlot  = d => orderSlot(d);
      }

      const ordArr = new Array(slots).fill(0);
      const convArr = new Array(slots).fill(0);
      orders.forEach(o => { const s = orderSlot(o.createdAt); if (s >= 0) ordArr[s]++; });
      conversations.forEach(c => { const s = convSlot(c.last_at); if (s >= 0) convArr[s]++; });
      return { labels, inquiries: convArr, orders: ordArr };
    }

    function renderChart(key = "week") {
      const { labels, inquiries: inqArr, orders: ordArr } = buildChartData(key);
      const svg = document.getElementById("chart-svg");
      if (!svg) return;
      const W=800,H=240,padL=40,padR=20,padT=20,padB=40;
      const innerW=W-padL-padR, innerH=H-padT-padB;
      const maxY = Math.max(...inqArr, ...ordArr, 1);
      const roundMax = Math.ceil(maxY / 5) * 5 || 5;
      const xStep = labels.length < 2 ? 0 : innerW / (labels.length - 1);
      const x = i => padL + i * xStep;
      const y = v => padT + innerH - (v / roundMax) * innerH;
      let grid = "";
      for (let i = 0; i <= 5; i++) {
        const gy = padT + innerH * i / 5;
        grid += `<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="#e5e7eb" stroke-width="1"/>`;
        grid += `<text x="${padL-8}" y="${gy+4}" text-anchor="end" font-size="10" fill="#9ca3af" font-family="Manrope,sans-serif">${Math.round(roundMax - roundMax*i/5)}</text>`;
      }
      let xLabels = "";
      labels.forEach((lab,i) => { xLabels += `<text x="${x(i)}" y="${H-14}" text-anchor="middle" font-size="11" fill="#6b7280" font-family="Manrope,sans-serif">${lab}</text>`; });
      const linePath = arr => arr.map((v,i) => `${i===0?"M":"L"} ${x(i)} ${y(v)}`).join(" ");
      const areaPath = arr => linePath(arr) + ` L ${x(arr.length-1)} ${padT+innerH} L ${padL} ${padT+innerH} Z`;
      const markers  = (arr, col) => arr.map((v,i) => `<circle cx="${x(i)}" cy="${y(v)}" r="4" fill="white" stroke="${col}" stroke-width="2"/>`).join("");
      svg.innerHTML = `${grid}${xLabels}
        <path d="${areaPath(inqArr)}" fill="#0f2e1f" opacity=".05"/>
        <path d="${areaPath(ordArr)}" fill="#86efac" opacity=".25"/>
        <path d="${linePath(inqArr)}" fill="none" stroke="#0f2e1f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="${linePath(ordArr)}" fill="none" stroke="#86efac" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${markers(inqArr,"#0f2e1f")}${markers(ordArr,"#86efac")}`;
    }
    window._dashRenderChart = renderChart;
    renderChart("week");

    /* ── Recent products ── */
    document.getElementById("recent-products").innerHTML = products.slice(0, 5).map(p => {
      const catName = (DataStore.getCategory(p.category) || {}).name || p.category;
      const s = !p.inStock ? "out" : (p.stockQty ?? 99) < 15 ? "low" : "in";
      const pill = { in:'<span class="m-pill m-pill--in">In Stock</span>', low:'<span class="m-pill m-pill--low">Low Stock</span>', out:'<span class="m-pill m-pill--out">Out of Stock</span>' }[s];
      return `<tr>
        <td><div class="m-prod-cell"><img src="${p.image}" alt="" onerror="this.src='${FALLBACK_IMG}'"><div class="m-prod-cell__name">${p.name}</div></div></td>
        <td style="color:var(--ink-500);font-size:13px">${catName}</td>
        <td>${fmtKSh(p.price)}</td>
        <td>${p.stockQty ?? "—"}</td>
        <td>${pill}</td>
        <td><div class="m-row-actions">
          <a class="m-btn-edit-lg" href="merchant-product-edit.html?id=${p.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit</a>
          <button class="m-btn-icon m-btn-icon--del" onclick="window._dashDeleteProduct('${p.id}')" aria-label="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg></button>
        </div></td>
      </tr>`;
    }).join("") || '<tr><td colspan="6" style="padding:32px;text-align:center;color:var(--ink-400)">No products yet</td></tr>';

    window._dashDeleteProduct = function(id) {
      if (!confirm("Delete this product? This cannot be undone.")) return;
      DataStore.deleteProduct(id);
      Toast.show("Product deleted");
      MerchantLayout.navigate("merchant-dashboard.html", { pushState: false });
    };

    /* ── Recent inquiries (real Supabase data) ── */
    function fmtTime(iso) {
      if (!iso) return "";
      const d = new Date(iso), now = new Date();
      const diff = now - d;
      if (diff < 86400000 && d.getDate() === now.getDate())
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      if (diff < 172800000) return "Yesterday";
      return d.toLocaleDateString([], { month: "short", day: "numeric" });
    }

    const inqEl = document.getElementById("recent-inquiries");
    if (conversations.length) {
      inqEl.innerHTML = conversations.slice(0, 4).map(c => {
        const name = c.customer_name || "Customer";
        const initials = name.split(" ").map(s=>s[0]).slice(0,2).join("").toUpperCase();
        const unread = (c.unread_merchant || 0) > 0;
        return `<div class="m-inq" onclick="MerchantLayout.navigate('merchant-messages.html?c=${encodeURIComponent(c.id)}',{pushState:true})">
          <div class="m-inq__avatar">${initials}</div>
          <div class="m-inq__body">
            <div class="m-inq__head">
              <span class="m-inq__name">${name}</span>
              <span class="m-inq__time">${fmtTime(c.last_at)}</span>
            </div>
            <div class="m-inq__msg">${(c.last_message || "").slice(0, 80) || "<em style='color:var(--ink-400)'>No messages yet</em>"}</div>
          </div>
          ${unread ? '<div class="m-inq__dot"></div>' : ''}
        </div>`;
      }).join("");
    } else {
      inqEl.innerHTML = '<div style="padding:32px 16px;text-align:center;color:var(--ink-400);font-size:13.5px">No customer inquiries yet.</div>';
    }

    /* ── Low stock strip ── */
    const strip = document.getElementById("low-stock-strip");
    if (lowStock.length) {
      strip.innerHTML = `
        <div class="m-alert-strip__head">
          <div class="m-alert-strip__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
          <div><b>Low Stock Alert</b><span>These items are running low and may need restocking soon.</span></div>
        </div>
        <div class="m-alert-items">
          ${lowStock.slice(0,3).map(p => `
            <div class="m-alert-item" onclick="MerchantLayout.navigate('merchant-product-edit.html?id=${p.id}',{pushState:true})">
              <img src="${p.image}" alt="" onerror="this.src='${FALLBACK_IMG}'">
              <div><b>${p.name}</b><span>${p.stockQty ?? "—"} in stock</span></div>
            </div>`).join("")}
        </div>
        <a class="btn btn--secondary" href="merchant-products.html?status=low">View All Low Stock</a>`;
    } else {
      strip.style.display = "none";
    }

    let _lastOrderCount = orders.length;
    const _pollId = setInterval(async () => {
      let shouldRefresh = false;
      if (window._sbClient) {
        const ok = await DataStore.fetchOrdersFromSupabase();
        if (ok) {
          const nextOrders = DataStore.getOrders();
          if (nextOrders.length > _lastOrderCount) {
            const delta = nextOrders.length - _lastOrderCount;
            Toast.show(`New order received (${delta})`, "success");
          }
          if (nextOrders.length !== _lastOrderCount) {
            _lastOrderCount = nextOrders.length;
            shouldRefresh = true;
          }
        }
      } else {
        const nextCount = DataStore.getOrders().length;
        if (nextCount > _lastOrderCount) {
          Toast.show(`New order received (${nextCount - _lastOrderCount})`, "success");
        }
        if (nextCount !== _lastOrderCount) {
          _lastOrderCount = nextCount;
          shouldRefresh = true;
        }
      }
      if (shouldRefresh) {
        MerchantLayout.navigate("merchant-dashboard.html", { pushState: false });
      }
    }, 4000);
    MerchantLayout._pageCleanup = () => clearInterval(_pollId);
  })();
</script>
  </body>
</html>
