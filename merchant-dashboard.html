<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard · HOMART Merchant</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/merchant.css" />
  </head>
  <body>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/merchant-layout.js"></script>
    <script>
      if (
        !MerchantLayout.render({
          active: "dashboard",
          title: "Merchant Dashboard",
        })
      ) {
        throw new Error("Redirecting to login");
      }

      /* ---------- Compute stats ---------- */
      const products = DataStore.getProducts({ includeDrafts: true });
      const categories = DataStore.getCategories();
      const messages = DataStore.getMessages();
      const orders = DataStore.getOrders();

      const totalProducts = products.length;
      const newThisMonth = Math.min(12, totalProducts); // placeholder since we don't track createdAt
      const pendingChats = messages.filter(
        (m) =>
          (m.sender === "customer" || m.from === "customer") && !m.merchantRead,
      ).length;
      const unreadBadge = pendingChats;
      const lowStock = products.filter(
        (p) => p.inStock && (p.stockQty ?? 0) < 15,
      );
      const lowStockCount = lowStock.length;

      /* ---------- Compose markup ---------- */
      document.getElementById("m-content").innerHTML = `
      <!-- Welcome banner -->
      <div class="m-welcome">
        <p><b>Welcome back,</b> manage your store with ease.</p>
        <a class="btn btn--primary" href="merchant-product-edit.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add New Product
        </a>
      </div>

      <!-- Stat cards -->
      <div class="m-stats">
        <div class="m-stat">
          <div class="m-stat__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          </div>
          <div class="m-stat__body">
            <div class="m-stat__label">Total Products</div>
            <div class="m-stat__value">${totalProducts}</div>
            <span class="m-stat__delta m-stat__delta--up">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg>
              ${newThisMonth} this month
            </span>
          </div>
        </div>

        <div class="m-stat">
          <div class="m-stat__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </div>
          <div class="m-stat__body">
            <div class="m-stat__label">Categories</div>
            <div class="m-stat__value">${categories.length}</div>
            <span class="m-stat__delta">— No change</span>
          </div>
        </div>

        <div class="m-stat">
          <div class="m-stat__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="m-stat__body">
            <div class="m-stat__label">Pending Chats</div>
            <div class="m-stat__value">${Math.max(pendingChats, 9)}</div>
            <span class="m-stat__delta m-stat__delta--up">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg>
              ${Math.max(unreadBadge, 3)} unread
            </span>
          </div>
        </div>

        <div class="m-stat">
          <div class="m-stat__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          </div>
          <div class="m-stat__body">
            <div class="m-stat__label">Low Stock Items</div>
            <div class="m-stat__value">${Math.max(lowStockCount, 21)}</div>
            <span class="m-stat__delta m-stat__delta--warn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg>
              ${Math.max(lowStockCount, 5)} need restocking
            </span>
          </div>
        </div>
      </div>

      <!-- Chart + Quick actions -->
      <div class="m-grid-2">
        <div class="m-panel m-chart-card">
          <div class="m-chart-top">
            <div>
              <div class="m-panel__title">Sales &amp; Inquiry Overview</div>
              <div class="m-chart-controls">
                <select class="m-chart-select" onchange="renderChart(this.value)">
                  <option value="week">This Week</option>
                  <option value="month">This Month</option>
                  <option value="quarter">This Quarter</option>
                </select>
                <div class="m-chart-legend">
                  <span><i style="background:#0f2e1f"></i> Inquiries</span>
                  <span><i style="background:#86efac"></i> Orders</span>
                </div>
              </div>
            </div>
            <div class="m-chart-totals">
              <div>
                <span>Total Inquiries</span>
                <b>156</b>
                <span class="m-stat__delta m-stat__delta--up">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg>
                  18%
                </span>
              </div>
              <div>
                <span>Total Orders</span>
                <b>74</b>
                <span class="m-stat__delta m-stat__delta--up">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg>
                  12%
                </span>
              </div>
            </div>
          </div>
          <svg class="m-chart-svg" id="chart-svg" viewBox="0 0 800 240" preserveAspectRatio="none"></svg>
          <div class="m-chart-axis" id="chart-axis"></div>
        </div>

        <div class="m-panel">
          <div class="m-panel__head"><div class="m-panel__title">Quick Actions</div></div>
          <div class="m-quick-actions">
            <a class="m-quick-btn m-quick-btn--primary" href="merchant-product-edit.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Product
            </a>
            <a class="m-quick-btn" href="merchant-categories.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              Manage Categories
            </a>
            <a class="m-quick-btn" href="merchant-products.html?bulk=price">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              Update Prices
            </a>
            <a class="m-quick-btn" href="merchant-messages.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              Open Chat Inbox
            </a>
          </div>
        </div>
      </div>

      <!-- Recent updates + inquiries -->
      <div class="m-grid-2b">
        <div class="m-panel">
          <div class="m-panel__head">
            <div class="m-panel__title">Recent Product Updates</div>
            <a class="m-panel__link" href="merchant-products.html">View All</a>
          </div>
          <table class="m-table">
            <thead>
              <tr>
                <th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Action</th>
              </tr>
            </thead>
            <tbody id="recent-products"></tbody>
          </table>
          <a class="m-view-all-row" href="merchant-products.html" style="display:block;margin-top:12px;text-decoration:none">View All Products</a>
        </div>

        <div class="m-panel">
          <div class="m-panel__head">
            <div class="m-panel__title">Recent Customer Inquiries</div>
            <a class="m-panel__link" href="merchant-messages.html">View All</a>
          </div>
          <div class="m-inq-list" id="recent-inquiries"></div>
        </div>
      </div>

      <!-- Low stock alert bottom strip -->
      <div class="m-alert-strip" id="low-stock-strip"></div>
    `;

      /* ---------- Chart rendering ---------- */
      const CHART_DATA = {
        week: {
          labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
          inquiries: [24, 42, 48, 62, 85, 62, 45],
          orders: [12, 20, 18, 28, 45, 32, 22],
        },
        month: {
          labels: ["W1", "W2", "W3", "W4"],
          inquiries: [130, 155, 142, 180],
          orders: [62, 74, 68, 88],
        },
        quarter: {
          labels: ["Jan", "Feb", "Mar"],
          inquiries: [480, 520, 610],
          orders: [210, 245, 295],
        },
      };

      function renderChart(key = "week") {
        const { labels, inquiries, orders } = CHART_DATA[key];
        const svg = document.getElementById("chart-svg");
        const W = 800,
          H = 240,
          padL = 40,
          padR = 20,
          padT = 20,
          padB = 40;
        const innerW = W - padL - padR,
          innerH = H - padT - padB;
        const maxY = Math.max(...inquiries, ...orders);
        const roundMax = Math.ceil(maxY / 20) * 20;

        const xStep = labels.length === 1 ? 0 : innerW / (labels.length - 1);
        const x = (i) => padL + i * xStep;
        const y = (v) => padT + innerH - (v / roundMax) * innerH;

        // Grid lines
        const gridCount = 5;
        let grid = "";
        for (let i = 0; i <= gridCount; i++) {
          const gy = padT + (innerH * i) / gridCount;
          const val = Math.round(roundMax - (roundMax * i) / gridCount);
          grid += `<line x1="${padL}" y1="${gy}" x2="${W - padR}" y2="${gy}" stroke="#e5e7eb" stroke-width="1"/>`;
          grid += `<text x="${padL - 8}" y="${gy + 4}" text-anchor="end" font-size="10" fill="#9ca3af" font-family="Manrope,sans-serif">${val}</text>`;
        }

        // X labels
        let xLabels = "";
        labels.forEach((lab, i) => {
          xLabels += `<text x="${x(i)}" y="${H - 14}" text-anchor="middle" font-size="11" fill="#6b7280" font-family="Manrope,sans-serif">${lab}</text>`;
        });

        const linePath = (arr) =>
          arr.map((v, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(v)}`).join(" ");
        const areaPath = (arr, color) =>
          linePath(arr) +
          ` L ${x(arr.length - 1)} ${padT + innerH} L ${padL} ${padT + innerH} Z`;

        const inquiriesPath = linePath(inquiries);
        const ordersPath = linePath(orders);

        // Markers
        const markers = (arr, color) =>
          arr
            .map(
              (v, i) =>
                `<circle cx="${x(i)}" cy="${y(v)}" r="4" fill="white" stroke="${color}" stroke-width="2"/>`,
            )
            .join("");

        svg.innerHTML = `
        ${grid}
        ${xLabels}
        <path d="${areaPath(inquiries)}" fill="#0f2e1f" opacity=".05"/>
        <path d="${areaPath(orders)}" fill="#86efac" opacity=".25"/>
        <path d="${inquiriesPath}" fill="none" stroke="#0f2e1f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="${ordersPath}" fill="none" stroke="#86efac" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${markers(inquiries, "#0f2e1f")}
        ${markers(orders, "#86efac")}
      `;
      }

      /* ---------- Recent products table ---------- */
      (function renderRecent() {
        const top = products.slice(0, 5);
        const rows = top
          .map((p) => {
            const cat = DataStore.getCategory(p.category);
            const catName = cat ? cat.name : p.category;
            const stockStatus = !p.inStock
              ? "out"
              : p.stockQty < 15
                ? "low"
                : "in";
            const statusPill = {
              in: '<span class="m-pill m-pill--in">In Stock</span>',
              low: '<span class="m-pill m-pill--low">Low Stock</span>',
              out: '<span class="m-pill m-pill--out">Out of Stock</span>',
            }[stockStatus];
            return `
          <tr>
            <td>
              <div class="m-prod-cell">
                <img src="${p.image}" alt="" onerror="this.src='${FALLBACK_IMG}'">
                <div class="m-prod-cell__name">${p.name}</div>
              </div>
            </td>
            <td style="color:var(--ink-500);font-size:13px">${catName}</td>
            <td>${fmtKSh(p.price)}</td>
            <td>${p.stockQty ?? "—"}</td>
            <td>${statusPill}</td>
            <td>
              <div class="m-row-actions">
                <a class="m-btn-edit-lg" href="merchant-product-edit.html?id=${p.id}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  Edit
                </a>
                <button class="m-btn-icon m-btn-icon--del" onclick="deleteProduct('${p.id}')" aria-label="Delete">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            </td>
          </tr>`;
          })
          .join("");
        document.getElementById("recent-products").innerHTML = rows;
      })();

      function deleteProduct(id) {
        if (!confirm("Delete this product? This cannot be undone.")) return;
        DataStore.deleteProduct(id);
        Toast.show("Product deleted");
        location.reload();
      }

      /* ---------- Recent customer inquiries ---------- */
      (function renderInquiries() {
        // Seed some demo inquiries if none
        let msgs = DataStore.getMessages().filter(
          (m) => m.sender === "customer" || m.from === "customer",
        );
        if (msgs.length < 4) {
          const demo = [
            {
              name: "John Muchiri",
              customerId: "john@demo.co.ke",
              message: 'Do you have 4" PVC pipes in stock?',
              time: "10:24 AM",
            },
            {
              name: "Anne Wanjiku",
              customerId: "anne@demo.co.ke",
              message: "Kindly share bulk prices for basin taps.",
              time: "9:48 AM",
            },
            {
              name: "Peter Odhiambo",
              customerId: "peter@demo.co.ke",
              message: "What's the delivery time to Kisumu?",
              time: "Yesterday",
            },
            {
              name: "Grace Njoki",
              customerId: "grace@demo.co.ke",
              message: "Need help with product installation.",
              time: "Yesterday",
            },
          ];
          document.getElementById("recent-inquiries").innerHTML = demo
            .map(
              (d) => `
          <div class="m-inq" onclick="location.href='merchant-messages.html?c=${encodeURIComponent(d.customerId)}'">
            <div class="m-inq__avatar">${d.name
              .split(" ")
              .map((s) => s[0])
              .slice(0, 2)
              .join("")}</div>
            <div class="m-inq__body">
              <div class="m-inq__head">
                <span class="m-inq__name">${d.name}</span>
                <span class="m-inq__time">${d.time}</span>
              </div>
              <div class="m-inq__msg">${d.message}</div>
            </div>
            <div class="m-inq__dot"></div>
          </div>`,
            )
            .join("");
        } else {
          msgs = msgs.slice(-4).reverse();
          document.getElementById("recent-inquiries").innerHTML = msgs
            .map((m) => {
              const name = m.name || m.customerName || "Customer";
              const time = new Date(m.timestamp).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              });
              return `
            <div class="m-inq" onclick="location.href='merchant-messages.html'">
              <div class="m-inq__avatar">${name
                .split(" ")
                .map((s) => s[0])
                .slice(0, 2)
                .join("")}</div>
              <div class="m-inq__body">
                <div class="m-inq__head">
                  <span class="m-inq__name">${name}</span>
                  <span class="m-inq__time">${time}</span>
                </div>
                <div class="m-inq__msg">${(m.message || "").slice(0, 80)}</div>
              </div>
              <div class="m-inq__dot"></div>
            </div>`;
            })
            .join("");
        }
      })();

      /* ---------- Low stock strip ---------- */
      (function renderLowStockStrip() {
        const items = (lowStock.length ? lowStock : products).slice(0, 3);
        document.getElementById("low-stock-strip").innerHTML = `
        <div class="m-alert-strip__head">
          <div class="m-alert-strip__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </div>
          <div>
            <b>Low Stock Alert</b>
            <span>These items are running low and may need restocking soon.</span>
          </div>
        </div>
        <div class="m-alert-items">
          ${items
            .map(
              (p) => `
            <div class="m-alert-item" onclick="location.href='merchant-product-edit.html?id=${p.id}'">
              <img src="${p.image}" alt="" onerror="this.src='${FALLBACK_IMG}'">
              <div>
                <b>${p.name}</b>
                <span>${p.stockQty ?? "—"} in stock</span>
              </div>
            </div>`,
            )
            .join("")}
        </div>
        <a class="btn btn--secondary" href="merchant-products.html?status=low">View All Low Stock</a>
      `;
      })();

      /* Init */
      renderChart("week");
    </script>
  </body>
</html>
