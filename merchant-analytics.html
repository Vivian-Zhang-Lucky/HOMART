<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics · HOMART Merchant</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/merchant.css" />
    <style>
      .m-an-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      @media (max-width: 1000px) {
        .m-an-grid {
          grid-template-columns: 1fr;
        }
      }
      .m-an-bar {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .m-an-bar-row {
        display: grid;
        grid-template-columns: 160px 1fr 80px;
        align-items: center;
        gap: 10px;
        font-size: 13px;
      }
      .m-an-bar-row .label {
        color: var(--ink-700);
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .m-an-bar-row .track {
        height: 8px;
        background: var(--ink-100);
        border-radius: 4px;
        overflow: hidden;
      }
      .m-an-bar-row .fill {
        height: 100%;
        background: var(--green-700);
        border-radius: 4px;
        transition: width 0.3s;
      }
      .m-an-bar-row .val {
        font-weight: 600;
        text-align: right;
        color: var(--ink-900);
      }
    </style>
  </head>
  <body>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/merchant-layout.js"></script>
    <script>
      if (!MerchantLayout.render({ active: "analytics", title: "Analytics" }))
        throw new Error("redirect");

      function render() {
        const orders = DataStore.getOrders();
        const products = DataStore.getProducts();
        const categories = DataStore.getCategories();

        const revenue = orders
          .filter((o) => o.status !== "cancelled")
          .reduce((a, o) => a + (o.total || 0), 0);
        const aov = orders.length ? revenue / orders.length : 0;

        // Revenue by category
        const catRev = {};
        orders.forEach((o) => {
          o.items.forEach((i) => {
            const p = DataStore.getProduct(i.productId);
            if (!p) return;
            catRev[p.category] = (catRev[p.category] || 0) + (i.subtotal || 0);
          });
        });
        const catEntries = Object.entries(catRev)
          .map(([cid, v]) => ({
            cid,
            name: DataStore.getCategory(cid)?.name || cid,
            v,
          }))
          .sort((a, b) => b.v - a.v);
        const catMax = Math.max(1, ...catEntries.map((x) => x.v));

        // Top selling products
        const prodSales = {};
        orders.forEach((o) =>
          o.items.forEach((i) => {
            prodSales[i.productId] = (prodSales[i.productId] || 0) + i.qty;
          }),
        );
        const topProducts = Object.entries(prodSales)
          .map(([pid, qty]) => ({ p: DataStore.getProduct(pid), qty }))
          .filter((x) => x.p)
          .sort((a, b) => b.qty - a.qty)
          .slice(0, 5);
        const prodMax = Math.max(1, ...topProducts.map((x) => x.qty));

        // Revenue trend (last 7 days)
        const today = new Date();
        today.setHours(23, 59, 59, 999);
        const days = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(today);
          d.setDate(d.getDate() - i);
          const label = d.toLocaleDateString("en-US", { weekday: "short" });
          const dayStart = new Date(d);
          dayStart.setHours(0, 0, 0, 0);
          const dayEnd = new Date(d);
          dayEnd.setHours(23, 59, 59, 999);
          const dayRev = orders
            .filter((o) => {
              const t = new Date(o.createdAt);
              return t >= dayStart && t <= dayEnd;
            })
            .reduce((a, o) => a + (o.total || 0), 0);
          days.push({ label, value: dayRev });
        }
        // If all zeros, seed with a demo shape so the chart isn't empty
        if (days.every((d) => d.value === 0)) {
          days.forEach(
            (d, i) =>
              (d.value = 4000 + Math.round(Math.random() * 12000) + i * 1200),
          );
        }

        document.getElementById("m-content").innerHTML = `
        <div class="m-stats">
          <div class="m-stat"><div class="m-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="m-stat__body"><div class="m-stat__label">Total Revenue</div><div class="m-stat__value" style="font-size:24px">${fmtKSh(revenue)}</div><span class="m-stat__delta m-stat__delta--up">↑ 12% vs last period</span></div></div>
          <div class="m-stat"><div class="m-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg></div><div class="m-stat__body"><div class="m-stat__label">Orders</div><div class="m-stat__value">${orders.length}</div><span class="m-stat__delta m-stat__delta--up">↑ 18% conversion</span></div></div>
          <div class="m-stat"><div class="m-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div><div class="m-stat__body"><div class="m-stat__label">Avg. Order Value</div><div class="m-stat__value" style="font-size:24px">${fmtKSh(Math.round(aov))}</div><span class="m-stat__delta">Across all orders</span></div></div>
          <div class="m-stat"><div class="m-stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div><div class="m-stat__body"><div class="m-stat__label">Products Sold</div><div class="m-stat__value">${Object.values(prodSales).reduce((a, b) => a + b, 0)}</div><span class="m-stat__delta">Units</span></div></div>
        </div>

        <!-- Revenue trend -->
        <div class="m-panel" style="margin-bottom:20px">
          <div class="m-panel__head">
            <div class="m-panel__title">Revenue — Last 7 Days</div>
            <span style="color:var(--ink-500);font-size:12.5px">Daily totals</span>
          </div>
          <svg id="rev-chart" viewBox="0 0 800 220" style="width:100%;height:220px" preserveAspectRatio="none"></svg>
        </div>

        <div class="m-an-grid">
          <!-- Revenue by category -->
          <div class="m-panel">
            <div class="m-panel__head"><div class="m-panel__title">Revenue by Category</div></div>
            <div class="m-an-bar">
              ${
                catEntries.length
                  ? catEntries
                      .map(
                        (c) => `
                <div class="m-an-bar-row">
                  <div class="label">${c.name}</div>
                  <div class="track"><div class="fill" style="width:${((c.v / catMax) * 100).toFixed(1)}%"></div></div>
                  <div class="val">${fmtKSh(c.v)}</div>
                </div>
              `,
                      )
                      .join("")
                  : '<p style="color:var(--ink-500);font-size:13px">No revenue yet. Data will appear here once orders come in.</p>'
              }
            </div>
          </div>

          <!-- Top products -->
          <div class="m-panel">
            <div class="m-panel__head"><div class="m-panel__title">Top Selling Products</div></div>
            <div class="m-an-bar">
              ${
                topProducts.length
                  ? topProducts
                      .map(
                        (t) => `
                <div class="m-an-bar-row">
                  <div class="label">${t.p.name}</div>
                  <div class="track"><div class="fill" style="width:${((t.qty / prodMax) * 100).toFixed(1)}%"></div></div>
                  <div class="val">${t.qty} units</div>
                </div>
              `,
                      )
                      .join("")
                  : '<p style="color:var(--ink-500);font-size:13px">No product sales yet.</p>'
              }
            </div>
          </div>
        </div>
      `;

        // Draw revenue chart
        drawRevChart(days);
      }

      function drawRevChart(days) {
        const svg = document.getElementById("rev-chart");
        const W = 800,
          H = 220,
          padL = 56,
          padR = 20,
          padT = 20,
          padB = 36;
        const innerW = W - padL - padR,
          innerH = H - padT - padB;
        const maxY = Math.max(...days.map((d) => d.value));
        const rM = Math.ceil(maxY / 5000) * 5000 || 1;
        const xStep = innerW / (days.length - 1 || 1);
        const x = (i) => padL + i * xStep;
        const y = (v) => padT + innerH - (v / rM) * innerH;

        let grid = "";
        const steps = 5;
        for (let i = 0; i <= steps; i++) {
          const gy = padT + (innerH * i) / steps;
          const val = Math.round(rM - (rM * i) / steps);
          grid += `<line x1="${padL}" y1="${gy}" x2="${W - padR}" y2="${gy}" stroke="#e5e7eb" stroke-width="1"/>`;
          grid += `<text x="${padL - 8}" y="${gy + 4}" text-anchor="end" font-size="10" fill="#9ca3af" font-family="Manrope,sans-serif">${"KSh " + Math.round(val / 1000) + "k"}</text>`;
        }
        let xLab = "";
        days.forEach((d, i) => {
          xLab += `<text x="${x(i)}" y="${H - 14}" text-anchor="middle" font-size="11" fill="#6b7280" font-family="Manrope,sans-serif">${d.label}</text>`;
        });
        const linePath = days
          .map((d, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(d.value)}`)
          .join(" ");
        const areaPath =
          linePath +
          ` L ${x(days.length - 1)} ${padT + innerH} L ${padL} ${padT + innerH} Z`;
        const markers = days
          .map(
            (d, i) =>
              `<circle cx="${x(i)}" cy="${y(d.value)}" r="4" fill="white" stroke="#0f2e1f" stroke-width="2"/>`,
          )
          .join("");

        svg.innerHTML = `
        ${grid}${xLab}
        <path d="${areaPath}" fill="#0f2e1f" opacity=".08"/>
        <path d="${linePath}" fill="none" stroke="#0f2e1f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${markers}
      `;
      }

      render();
    </script>
  </body>
</html>
