<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product · HOMART Hardware</title>
    <meta
      name="description"
      content="Factory direct hardware, plumbing and sanitary ware supplier in Kenya."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="header-slot"></div>

    <main>
      <div class="container">
        <!-- Breadcrumb -->
        <nav class="crumb" id="crumb"></nav>

        <!-- PDP body -->
        <section class="pdp" id="pdp"></section>

        <!-- Tabs -->
        <section class="tabs" id="tabs"></section>

        <!-- Related -->
        <section class="related-wrap">
          <h2 class="related-head">Related Products</h2>
          <button
            class="related-arrow related-arrow--left"
            onclick="scrollRelated(-1)"
            aria-label="Scroll left"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <div class="related-scroller" id="related"></div>
          <button
            class="related-arrow related-arrow--right"
            onclick="scrollRelated(1)"
            aria-label="Scroll right"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="9 18 15 12 9 6" />
            </svg>
          </button>
        </section>
      </div>
    </main>

    <div id="trustbar-slot"></div>
    <div id="footer-slot"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/supabase-chat.js"></script>
    <script src="js/layout.js"></script>
    <script>
      /* ---------- Load product ---------- */
      const productId = URLParams.get("id") || "p002";
      const product = DataStore.getProduct(productId);

      if (!product) {
        document.querySelector("main").innerHTML =
          '<div class="container" style="padding:80px 0;text-align:center">' +
          '<h1 style="font-family:var(--font-display);font-size:28px;margin-bottom:12px">Product not found</h1>' +
          '<p style="color:var(--ink-500);margin-bottom:24px">Sorry, we couldn\'t find this product.</p>' +
          '<a class="btn btn--primary" href="category.html">Browse all products</a></div>';
        Layout.render("");
        throw new Error("Product not found");
      }

      /* Header nav active: try to match top-level */
      const navActive =
        product.category === "bathroom-fixtures"
          ? "bathroom-fixtures"
          : product.category === "plumbing"
            ? "plumbing"
            : product.category || "";
      Layout.render(navActive);

      /* ---------- Breadcrumb ---------- */
      (function renderCrumb() {
        const cat = DataStore.getCategory(product.category);
        const sub =
          cat && cat.subcategories.find((s) => s.id === product.subcategory);

        // For bathroom fixtures we also show Plumbing as parent (matches mockup)
        const parts = [{ label: "Home", href: "index.html" }];
        if (product.category === "bathroom-fixtures") {
          parts.push({ label: "Plumbing", href: "category.html?cat=plumbing" });
          parts.push({
            label: "Bathroom Fixtures",
            href: "category.html?cat=bathroom-fixtures",
          });
        } else if (cat) {
          parts.push({ label: cat.name, href: `category.html?cat=${cat.id}` });
        }
        if (sub)
          parts.push({
            label: sub.name,
            href: `category.html?cat=${product.category}&sub=${sub.id}`,
          });
        parts.push({ label: product.name, href: null });

        document.getElementById("crumb").innerHTML = parts
          .map((p, i) => {
            const sep = i > 0 ? '<span class="crumb__sep">/</span>' : "";
            return (
              sep +
              (p.href
                ? `<a href="${p.href}">${p.label}</a>`
                : `<span>${p.label}</span>`)
            );
          })
          .join("");
      })();

      /* ---------- PDP state ---------- */
      const images =
        product.images && product.images.length
          ? product.images
          : [product.image];
      const variantKeys = product.variants ? Object.keys(product.variants) : [];
      const state = {
        mainIdx: 0,
        variant: variantKeys.reduce((acc, k) => {
          acc[k] = product.variants[k][0];
          return acc;
        }, {}),
        qty: 1,
      };

      /* ---------- Render PDP ---------- */
      function renderPdp() {
        const thumbsHtml = images
          .map(
            (src, i) => `
        <button class="pdp__thumb ${i === state.mainIdx ? "is-active" : ""}" onclick="setMainImg(${i})" aria-label="Image ${i + 1}">
          <img src="${src}" alt="" onerror="this.src='${FALLBACK_IMG}'">
        </button>`,
          )
          .join("");

        const stockBadge = product.inStock
          ? '<span class="stock-badge">In Stock</span>'
          : '<span class="stock-badge stock-badge--out">Out of Stock</span>';

        const priceHtml = product.requestPrice
          ? '<div class="pdp__price" style="font-size:22px;color:var(--green-700);font-weight:700">Request Price</div>'
          : `<div class="pdp__price">${fmtKSh(product.price)}</div>`;

        const variantsHtml = variantKeys
          .map((key) => {
            const opts = product.variants[key];
            const current = state.variant[key];
            // For Finish / Color variants render swatches; otherwise pill buttons
            const isColor = /finish|color|colour/i.test(key);
            const swatches = opts
              .map((opt) => {
                if (isColor) {
                  const bg = colorFor(opt);
                  return `<button class="pdp__swatch ${opt === current ? "is-active" : ""}" title="${opt}"
              style="background:${bg}" onclick="setVariant('${key}','${opt.replace(/'/g, "\\'")}')"></button>`;
                }
                return `<button class="pdp__swatch pdp__swatch--pill ${opt === current ? "is-active" : ""}"
            onclick="setVariant('${key}','${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
              })
              .join("");
            return `<div class="pdp__variant-label"><b>${key}:</b> <span class="val">${current}</span></div>
                <div class="pdp__swatches">${swatches}</div>`;
          })
          .join("");

        const mainCta = product.requestPrice
          ? `<button class="btn btn--primary" onclick="Chat.askAbout('${product.id}')">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
             Request Price
           </button>`
          : `<button class="btn btn--primary" onclick="addToCartAction()">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
             Add to Cart
           </button>`;

        document.getElementById("pdp").innerHTML = `
        <!-- Thumbs -->
        <div class="pdp__thumbs">${thumbsHtml}</div>

        <!-- Main image -->
        <div class="pdp__main-img">
          <img id="main-img" src="${images[state.mainIdx]}" alt="${product.name}"
               onerror="this.src='${FALLBACK_IMG}'">
          <button class="pdp__zoom" aria-label="Zoom" onclick="toggleZoom()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
          </button>
        </div>

        <!-- Info -->
        <div class="pdp__info">
          <h1>${product.name}</h1>
          <p class="pdp__tagline">${product.description || ""}</p>
          <div class="pdp__sku-row">
            <span>SKU: ${product.sku || "—"}</span>
            ${stockBadge}
          </div>
          ${priceHtml}

          <div class="pdp__highlights">
            <div class="pdp__high">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              <div><b>Factory Direct</b>Better Price</div>
            </div>
            <div class="pdp__high">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6z"/></svg>
              <div><b>Quality Assured</b>Built to Last</div>
            </div>
            <div class="pdp__high">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="7" width="15" height="10"/><path d="M16 10h4l3 3v4h-7"/><circle cx="6" cy="19" r="2"/><circle cx="18" cy="19" r="2"/></svg>
              <div><b>Nationwide Delivery</b>All Counties</div>
            </div>
          </div>

          ${variantsHtml}

          <div class="pdp__qty-row">
            <label>Quantity</label>
            <div class="qty">
              <button onclick="setQty(state.qty - 1)" aria-label="Decrease">−</button>
              <input type="number" min="1" value="${state.qty}" id="qty-input"
                     onchange="setQty(parseInt(this.value)||1)">
              <button onclick="setQty(state.qty + 1)" aria-label="Increase">+</button>
            </div>
          </div>

          <div class="pdp__actions">
            ${mainCta}
            <div class="pdp__actions-sec">
              <button class="btn btn--secondary" onclick="Chat.askAbout('${product.id}'); window.scrollTo({top:0,behavior:'smooth'})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12" y2="17"/></svg>
                Request Quote
              </button>
              <button class="btn btn--secondary" onclick="Chat.askAbout('${product.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Chat Now
              </button>
            </div>
          </div>

          <div class="pdp__secure">
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Secure Checkout
            </span>
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 10 9 10"/></svg>
              7-Day Easy Returns
            </span>
          </div>
        </div>

        <!-- Right assist panel -->
        <aside class="pdp__assist">
          <h3>Need pricing or assistance?</h3>
          <div class="pdp__online">We're online</div>
          <div class="pdp__agent-pic">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=400&auto=format&fit=crop"
                 alt="Agent" onerror="this.src='${FALLBACK_IMG}'">
          </div>
          <p>Talk to our team for pricing, quantity, shipping &amp; technical details—instantly.</p>
          <ul>
            <li>Discuss pricing &amp; discounts</li>
            <li>Check stock &amp; lead time</li>
            <li>Nationwide delivery options</li>
            <li>Technical specifications</li>
          </ul>
          <button class="btn btn--primary" onclick="Chat.askAbout('${product.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Start Live Chat
          </button>
          <button class="btn btn--secondary" onclick="openWhatsApp()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.52 3.48A11.94 11.94 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.12.56 4.18 1.62 6L0 24l6.18-1.62A12 12 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.19-1.25-6.19-3.48-8.52zM12 22a10 10 0 0 1-5.3-1.54l-.38-.23-3.67.96.98-3.58-.25-.37A10 10 0 1 1 22 12a10 10 0 0 1-10 10zm5.5-7.5c-.3-.15-1.78-.88-2.05-.98-.28-.1-.48-.15-.68.15-.2.3-.78.98-.95 1.18-.17.2-.35.22-.65.08-.3-.15-1.26-.46-2.4-1.47-.89-.79-1.48-1.76-1.66-2.06-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.38-.03-.53-.08-.15-.68-1.63-.93-2.23-.24-.58-.49-.5-.68-.51l-.58-.01c-.2 0-.52.08-.79.38-.27.3-1.04 1.02-1.04 2.48 0 1.46 1.06 2.87 1.21 3.07.15.2 2.1 3.22 5.1 4.52.71.3 1.27.48 1.7.62.72.23 1.37.2 1.89.12.58-.09 1.78-.73 2.03-1.43.25-.7.25-1.3.18-1.43-.07-.13-.28-.2-.58-.35z"/></svg>
            Chat on WhatsApp
          </button>
        </aside>
      `;
      }

      /* ---------- Actions ---------- */
      function setMainImg(i) {
        state.mainIdx = i;
        document.getElementById("main-img").src = images[i];
        document.querySelectorAll(".pdp__thumb").forEach((el, idx) => {
          el.classList.toggle("is-active", idx === i);
        });
      }
      function setVariant(key, val) {
        state.variant[key] = val;
        renderPdp();
      }
      function setQty(n) {
        state.qty = Math.max(1, n);
        const input = document.getElementById("qty-input");
        if (input) input.value = state.qty;
      }
      function addToCartAction() {
        const variant = variantKeys.length ? { ...state.variant } : null;
        Cart.add(product.id, state.qty, variant);
      }
      function toggleZoom() {
        const overlay = document.createElement("div");
        overlay.className = "zoom-overlay";
        overlay.innerHTML = `<img src="${images[state.mainIdx]}" alt=""><button class="zoom-close" aria-label="Close">✕</button>`;
        overlay.onclick = () => overlay.remove();
        document.body.appendChild(overlay);
      }
      function openWhatsApp() {
        Toast.show("WhatsApp: +254 700 123 456", "info");
      }
      function colorFor(name) {
        const map = {
          "brushed brass": "linear-gradient(135deg,#c9a96a 0%,#a8864a 100%)",
          brass: "linear-gradient(135deg,#d4b877 0%,#9c7f3a 100%)",
          chrome: "linear-gradient(135deg,#e5e7eb 0%,#9ca3af 100%)",
          white: "#ffffff",
          black: "#111827",
          silver: "linear-gradient(135deg,#f1f5f9 0%,#94a3b8 100%)",
        };
        return map[name.toLowerCase()] || "#e5e7eb";
      }

      /* ---------- Tabs ---------- */
      function renderTabs() {
        const specsEntries = Object.entries(product.specs || {});
        const specsHtml = specsEntries.length
          ? `<div class="specs-grid">${specsEntries
              .map(
                ([k, v]) => `
              <div class="specs-row">
                <div class="specs-key">${k}</div>
                <div class="specs-val">${v}</div>
              </div>`,
              )
              .join("")}</div>`
          : "<p>No specifications available.</p>";

        document.getElementById("tabs").innerHTML = `
        <div class="tabs__head">
          <button class="tabs__btn is-active" onclick="switchTab(this,'desc')">Description</button>
          <button class="tabs__btn" onclick="switchTab(this,'specs')">Specifications</button>
          <button class="tabs__btn" onclick="switchTab(this,'ship')">Delivery &amp; Payment</button>
        </div>
        <div class="tabs__body" id="tab-body">
          <div data-tab="desc">${product.longDescription || product.description || ""}</div>
          <div data-tab="specs" hidden>${specsHtml}</div>
          <div data-tab="ship" hidden>
            <p style="margin-bottom:12px"><b>Delivery:</b> We deliver nationwide across all 47 counties in Kenya. Standard delivery within Nairobi &amp; Mombasa takes 1–2 business days. Other counties 2–5 business days. Bulk orders may require additional lead time.</p>
            <p style="margin-bottom:12px"><b>Payment methods:</b> M-PESA, Bank Transfer, Visa &amp; Mastercard, and Pay After Quotation for verified business accounts.</p>
            <p><b>Returns:</b> 7-day easy returns for unused products in original packaging. Manufacturing defects covered by warranty where applicable.</p>
          </div>
        </div>`;
      }
      function switchTab(btn, tab) {
        document
          .querySelectorAll(".tabs__btn")
          .forEach((b) => b.classList.remove("is-active"));
        btn.classList.add("is-active");
        document.querySelectorAll("#tab-body > [data-tab]").forEach((el) => {
          el.hidden = el.getAttribute("data-tab") !== tab;
        });
      }

      /* ---------- Related ---------- */
      function renderRelated() {
        const list = DataStore.getRelatedProducts(product, 6);
        document.getElementById("related").innerHTML = list
          .map((p) => {
            const priceHtml = p.requestPrice
              ? '<div class="card__price card__price--request">Request Price</div>'
              : `<div class="card__price">${fmtKSh(p.price)}</div>`;
            return `
          <article class="card">
            <a class="card__img-link" href="product.html?id=${p.id}">
              <div class="card__img"><img src="${p.image}" alt="${p.name}" onerror="this.src='${FALLBACK_IMG}'"></div>
              <span class="stock-badge card__badge">In Stock</span>
            </a>
            <div class="card__body">
              <h3 class="card__name"><a href="product.html?id=${p.id}">${p.name}</a></h3>
              ${priceHtml}
            </div>
            <div class="card__actions">
              <button class="btn btn--primary" onclick="Cart.add('${p.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
                Add to Cart
              </button>
            </div>
          </article>`;
          })
          .join("");
      }
      function scrollRelated(dir) {
        document
          .getElementById("related")
          .scrollBy({ left: dir * 480, behavior: "smooth" });
      }

      /* ---------- Init ---------- */
      renderPdp();
      renderTabs();
      renderRelated();
    </script>

    <style>
      /* PDP-specific extras */
      .pdp__swatch {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.12);
        transition: border-color 0.15s;
      }
      .pdp__swatch.is-active {
        border-color: var(--green-700);
      }
      .pdp__swatch--pill {
        width: auto;
        height: auto;
        border-radius: 999px;
        padding: 8px 14px;
        background: white;
        border: 1px solid var(--ink-200);
        font-size: 13px;
        color: var(--ink-700);
        box-shadow: none;
      }
      .pdp__swatch--pill.is-active {
        border-color: var(--green-700);
        background: var(--green-50);
        color: var(--green-700);
        font-weight: 600;
      }
      .specs-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        border: 1px solid var(--ink-200);
        border-radius: var(--r-md);
        overflow: hidden;
      }
      .specs-row {
        display: flex;
        padding: 14px 16px;
        border-bottom: 1px solid var(--ink-100);
        font-size: 13.5px;
      }
      .specs-row:nth-last-child(-n + 2) {
        border-bottom: 0;
      }
      .specs-row:nth-child(odd) {
        border-right: 1px solid var(--ink-100);
      }
      .specs-key {
        flex: 0 0 45%;
        color: var(--ink-500);
      }
      .specs-val {
        color: var(--ink-900);
        font-weight: 500;
      }
      .related-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-20%);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: white;
        border: 1px solid var(--ink-200);
        box-shadow: var(--shadow-sm);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
      }
      .related-arrow:hover {
        background: var(--ink-50);
      }
      .related-arrow svg {
        width: 18px;
        height: 18px;
      }
      .related-arrow--left {
        left: -14px;
      }
      .related-arrow--right {
        right: -14px;
      }
      .zoom-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.88);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        cursor: zoom-out;
        padding: 40px;
      }
      .zoom-overlay img {
        max-width: 90vw;
        max-height: 90vh;
        object-fit: contain;
      }
      .zoom-close {
        position: absolute;
        top: 20px;
        right: 24px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: white;
        color: var(--ink-900);
        font-size: 18px;
        cursor: pointer;
      }
      @media (max-width: 900px) {
        .specs-grid {
          grid-template-columns: 1fr;
        }
        .specs-row:nth-child(odd) {
          border-right: 0;
        }
        .specs-row {
          border-bottom: 1px solid var(--ink-100);
        }
        .specs-row:last-child {
          border-bottom: 0;
        }
      }
    </style>
  </body>
</html>
